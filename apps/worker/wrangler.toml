name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# 本番環境（spire.mandai@gmail.com）
# 使い方: npx wrangler deploy
# D1:     npx wrangler d1 execute line-crm --remote --file ...
# ═══════════════════════════════════════════════════════════════
account_id = "2b2c391740bde4e16640a22541e29e3a"

[assets]
directory = "dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "bb264575-e44c-4193-9609-c095d873785e"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]

# ═══════════════════════════════════════════════════════════════
# (将来用: 別環境)
# ═══════════════════════════════════════════════════════════════
[env.production]
account_id = "2b2c391740bde4e16640a22541e29e3a"

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "bb264575-e44c-4193-9609-c095d873785e"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[env.production.triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]
